name: ci

on:
  push:
    branches: [main, feat/wordpiece-sp-tokenizers]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (nightly, edition 2024)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # gigatoken targets edition 2024 + uses #![feature(portable_simd)];
      # a nightly toolchain is required to build the workspace.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Format check
        run: cargo fmt --all -- --check

  bench-smoke:
    name: cargo bench (smoke, no iteration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      # Compile benches but don't run the full timing loop in CI.
      - name: Compile benches
        run: cargo bench --workspace --no-run
