name: Manual release build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            artifact: wheels-linux-x86_64
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
            artifact: wheels-linux-aarch64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            manylinux: "off"
            artifact: wheels-windows-x86_64
          - runner: windows-2022
            target: aarch64-pc-windows-msvc
            manylinux: "off"
            artifact: wheels-windows-aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Build abi3 wheel
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          maturin-version: v1.14.1
          rust-toolchain: nightly
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --out dist --compatibility pypi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          command: sdist
          maturin-version: v1.14.1
          rust-toolchain: nightly
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  bundle-release:
    name: Bundle release artifacts
    needs:
      - build-wheels
      - build-sdist
    runs-on: ubuntu-24.04
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: gigatoken-release
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  test-wheels:
    name: Test ${{ matrix.platform }} / Python ${{ matrix.python-version }}
    needs: build-wheels
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-x86_64
          - linux-aarch64
          - windows-x86_64
          - windows-aarch64
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        # actions/setup-python has no CPython 3.10 Windows ARM64 runtime.
        exclude:
          - platform: windows-aarch64
            python-version: "3.10"
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            artifact: wheels-linux-x86_64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            artifact: wheels-linux-aarch64
          - platform: windows-x86_64
            runner: windows-2022
            artifact: wheels-windows-x86_64
          - platform: windows-aarch64
            runner: windows-11-arm
            artifact: wheels-windows-aarch64

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/dist

      - name: Install and smoke-test wheel
        working-directory: ${{ runner.temp }}
        run: |
          python -m pip install --only-binary=:all: numpy awkward
          python -m pip install --no-index --find-links dist gigatoken
          python -c 'import gigatoken; tokens = list(gigatoken.pretokenizer(b"Hello, world!")); assert b"".join(tokens) == b"Hello, world!", tokens'
